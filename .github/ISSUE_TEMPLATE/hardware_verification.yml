name: Hardware verification
description: Report your testing results for an expected DYMO device — works, partial, or broken.
title: "Hardware: [Device name] ([PID])"
labels: ["hardware"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to test! Fill in what you can — even partial results help.
        Run `dymo list` and `dymo print text "test"` to get started.

  - type: dropdown
    id: result
    attributes:
      label: Result
      description: What was the overall outcome?
      options:
        - "✅ Works perfectly"
        - "⚠️ Partially works"
        - "❌ Does not work"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Device model
      placeholder: "e.g. LabelManager 420P"
    validations:
      required: true

  - type: input
    id: pid
    attributes:
      label: USB PID
      description: Find it with `lsusb | grep -i dymo` or Device Manager on Windows.
      placeholder: "e.g. 0x1004"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
      multiple: false
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node version
      placeholder: "e.g. v24.0.0  (run: node -v)"
    validations:
      required: true

  - type: input
    id: pkg_version
    attributes:
      label: Package version
      placeholder: "e.g. 0.3.1  (run: pnpm list @thermal-label/labelmanager-node)"
    validations:
      required: true

  - type: checkboxes
    id: tests
    attributes:
      label: Tests run
      options:
        - label: "`dymo list` — device appears in the list"
        - label: "`dymo print text \"test\"` — label printed successfully"
        - label: "`dymo status` — returned valid status JSON"
        - label: "`dymo print image` — image label printed successfully"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Quirks, workarounds, partial failure details, or anything else relevant.
      placeholder: "e.g. Required Zadig on Windows, status command times out after first print, 19mm tape ignored…"
