name: New device support
description: Request support for a DYMO printer not currently on the compatibility list.
title: "New device: [Device name] ([PID])"
labels: ["hardware", "new-device"]
body:
  - type: markdown
    attributes:
      value: |
        All DYMO LabelManager devices share vendor ID `0x0922`. If your device shows up
        under that VID but isn't on the [hardware list](/hardware), open this issue.

  - type: input
    id: model
    attributes:
      label: Device model
      placeholder: "e.g. LabelManager 280"
    validations:
      required: true

  - type: input
    id: pid
    attributes:
      label: USB PID
      description: "Find it with `lsusb | grep -i dymo` (Linux/macOS) or Device Manager (Windows)."
      placeholder: "e.g. 0x100f"
    validations:
      required: true

  - type: input
    id: tape_widths
    attributes:
      label: Tape widths supported by this device
      placeholder: "e.g. 6, 9, 12 mm"

  - type: dropdown
    id: tried
    attributes:
      label: Did you try running `dymo list`?
      options:
        - "Yes — device appeared in the list"
        - "Yes — device did not appear"
        - "No"
    validations:
      required: true

  - type: textarea
    id: lsusb
    attributes:
      label: "`lsusb -v` output"
      description: "Run `lsusb -v -d 0922:<pid>` and paste the output. Omit if on Windows."
      render: shell

  - type: input
    id: product_page
    attributes:
      label: Product page or purchase link
      placeholder: "https://…"
